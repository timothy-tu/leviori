<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumera Feature Map</title>
<style>
  :root {
    --bg: #fafafa;
    --surface: #ffffff;
    --text: #1a1a2e;
    --text-secondary: #555;
    --border: #e0e0e0;
    --accent: #2563eb;
    --accent-light: #eff6ff;
    --patient: #7c3aed;
    --patient-bg: #f5f3ff;
    --clinic: #0891b2;
    --clinic-bg: #ecfeff;
    --both-bg: #f0fdf4;
    --both: #16a34a;
    --stage1: #2563eb;
    --stage2: #8b5cf6;
    --workaround-bg: #fefce8;
    --workaround-border: #ca8a04;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    padding: 2rem;
    max-width: 1100px;
    margin: 0 auto;
  }

  header { margin-bottom: 1.5rem; }
  header h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 0.25rem; }
  header p { color: var(--text-secondary); font-size: 0.9rem; }

  .toolbar {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 0.5rem 1rem;
    align-items: center;
    margin-bottom: 1.5rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--border);
  }

  .toolbar-group { display: flex; gap: 0.25rem; }

  .toolbar-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--text-secondary);
    font-weight: 600;
    white-space: nowrap;
  }

  .toolbar-right {
    display: flex;
    gap: 0.25rem;
    justify-self: end;
  }

  .pill-btn {
    padding: 0.35rem 0.75rem;
    border: 1px solid var(--border);
    border-radius: 9999px;
    background: var(--surface);
    font-size: 0.8rem;
    cursor: pointer;
    color: var(--text-secondary);
    transition: all 0.15s;
  }

  .pill-btn:hover { border-color: var(--accent); color: var(--accent); }
  .pill-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .stats {
    display: flex;
    gap: 1.5rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }

  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.75rem 1.25rem;
    min-width: 120px;
  }

  .stat-value { font-size: 1.5rem; font-weight: 700; color: var(--accent); }
  .stat-label { font-size: 0.7rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.04em; }

  .feature-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 0.75rem;
    overflow: hidden;
  }

  .feature-header {
    padding: 0.75rem 1rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    cursor: pointer;
    user-select: none;
    transition: background 0.15s;
  }

  .feature-header:hover { background: var(--accent-light); }

  .feature-arrow {
    font-size: 0.65rem;
    color: var(--accent);
    transition: transform 0.2s;
    flex-shrink: 0;
  }

  .feature-card.open .feature-arrow { transform: rotate(90deg); }

  .feature-name { font-weight: 600; font-size: 0.95rem; }

  .feature-badges { margin-left: auto; display: flex; gap: 0.4rem; flex-shrink: 0; }

  .badge {
    font-size: 0.65rem;
    font-weight: 600;
    padding: 0.15rem 0.5rem;
    border-radius: 9999px;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }

  .badge-stage1 { background: #eff6ff; color: var(--stage1); }
  .badge-stage2 { background: #f5f3ff; color: var(--stage2); }
  .badge-patient { background: var(--patient-bg); color: var(--patient); }
  .badge-clinic { background: var(--clinic-bg); color: var(--clinic); }
  .badge-both { background: var(--both-bg); color: var(--both); }

  .feature-body {
    display: none;
    padding: 0 1rem 1rem;
  }

  .feature-card.open .feature-body { display: block; }

  .columns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }

  .column-header {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 700;
    margin-bottom: 0.4rem;
    padding-bottom: 0.25rem;
    border-bottom: 2px solid;
  }

  .column-header.patient { color: var(--patient); border-color: var(--patient); }
  .column-header.clinic { color: var(--clinic); border-color: var(--clinic); }

  .column ul {
    list-style: none;
    padding: 0;
  }

  .column li {
    font-size: 0.85rem;
    padding: 0.25rem 0;
    padding-left: 1rem;
    position: relative;
    color: var(--text);
  }

  .column li::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0.6rem;
    width: 6px;
    height: 6px;
    border-radius: 50%;
  }

  .column.patient-col li::before { background: var(--patient); }
  .column.clinic-col li::before { background: var(--clinic); }

  .empty-col {
    font-size: 0.8rem;
    color: var(--text-secondary);
    font-style: italic;
    padding: 0.25rem 0;
  }

  .workaround {
    margin-top: 0.75rem;
    padding: 0.5rem 0.75rem;
    background: var(--workaround-bg);
    border-left: 3px solid var(--workaround-border);
    border-radius: 0 6px 6px 0;
    font-size: 0.8rem;
    color: #92400e;
  }

  .workaround-label {
    font-weight: 700;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }

  .gap-section {
    margin-top: 0.75rem;
    padding: 0.5rem 0.75rem;
    background: #fef2f2;
    border-left: 3px solid #dc2626;
    border-radius: 0 6px 6px 0;
  }

  .gap-label {
    font-weight: 700;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    color: #dc2626;
    margin-bottom: 0.25rem;
  }

  .gap-section ul { list-style: none; padding: 0; }

  .gap-section li {
    font-size: 0.83rem;
    padding: 0.2rem 0;
    padding-left: 0.9rem;
    position: relative;
    color: #991b1b;
  }

  .gap-section li::before {
    content: '?';
    position: absolute;
    left: 0;
    font-weight: 700;
    color: #dc2626;
    font-size: 0.75rem;
  }

  .badge-gap {
    background: #fef2f2;
    color: #dc2626;
  }

  .item-counts {
    font-size: 0.75rem;
    color: var(--text-secondary);
  }

  .hours-badge {
    font-size: 0.75rem;
    color: var(--text-secondary);
    font-weight: 500;
    white-space: nowrap;
  }

  .back-to-top {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: var(--accent);
    color: #fff;
    border: none;
    cursor: pointer;
    font-size: 1.2rem;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s, transform 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .back-to-top.visible { opacity: 1; pointer-events: auto; }
  .back-to-top:hover { transform: scale(1.1); }

  @media (max-width: 640px) {
    body { padding: 1rem; }
    .columns { grid-template-columns: 1fr; }
    .stats { gap: 0.75rem; }
    .stat { min-width: 90px; padding: 0.5rem 0.75rem; }
  }
</style>
</head>
<body>

<header>
  <h1>Lumera Feature Map</h1>
  <p>Features, views, and stages. Update features.json to change content.</p>
</header>

<div class="toolbar">
  <span class="toolbar-label">Phase</span>
  <div class="toolbar-group" id="stageFilter">
    <button class="pill-btn active" data-filter="all">All</button>
    <button class="pill-btn" data-filter="1">Launch</button>
    <button class="pill-btn" data-filter="2">Enhancement</button>
  </div>
  <div class="toolbar-right">
    <button class="pill-btn" onclick="toggleAllCards(true)">Expand All</button>
    <button class="pill-btn" onclick="toggleAllCards(false)">Collapse All</button>
  </div>

  <span class="toolbar-label">View</span>
  <div class="toolbar-group" id="viewFilter">
    <button class="pill-btn active" data-filter="all">All</button>
    <button class="pill-btn" data-filter="patient">Patient</button>
    <button class="pill-btn" data-filter="clinic">Clinic</button>
    <button class="pill-btn" data-filter="both">Both</button>
  </div>
  <div class="toolbar-right" id="showFilter">
    <button class="pill-btn active" data-filter="features">All Features</button>
    <button class="pill-btn" data-filter="gaps">Gaps Only</button>
  </div>
</div>

<div class="stats" id="stats"></div>
<div id="featureList"></div>

<button class="back-to-top" id="backToTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">&#8593;</button>

let stageFilter = 'all';
let viewFilter = 'all';
let showFilter = 'features';

function getFiltered() {
  return features.filter(f => {
    if (stageFilter !== 'all' && f.stage !== parseInt(stageFilter)) return false;
    if (viewFilter !== 'all' && f.view !== viewFilter) return false;
    if (showFilter === 'gaps' && (!f.gaps || f.gaps.length === 0)) return false;
    return true;
  });
}

    const viewBadgeClass = f.view === 'patient' ? 'badge-patient' : f.view === 'clinic' ? 'badge-clinic' : 'badge-both';
    const viewLabel = f.view === 'both' ? 'Patient + Clinic' : f.view.charAt(0).toUpperCase() + f.view.slice(1);
    const stageBadgeClass = f.stage === 1 ? 'badge-stage1' : 'badge-stage2';
    const stageLabel = f.stage === 1 ? 'Phase 1' : 'Phase 2';

    const patientList = f.patientItems.length
      ? f.patientItems.map(item => `<li>${esc(item)}</li>`).join('')
      : '<div class="empty-col">No patient-facing items</div>';

    const clinicList = f.clinicItems.length
      ? f.clinicItems.map(item => `<li>${esc(item)}</li>`).join('')
      : '<div class="empty-col">No clinic-facing items</div>';

    const workaround = f.workaround
      ? `<div class="workaround"><div class="workaround-label">Launch workaround</div>${esc(f.workaround)}</div>`
      : '';

    const gapHtml = (f.gaps && f.gaps.length > 0)
      ? `<div class="gap-section"><div class="gap-label">Decisions needed (${f.gaps.length})</div><ul>${f.gaps.map(g => `<li>${esc(g)}</li>`).join('')}</ul></div>`
      : '';

    const gapBadge = (f.gaps && f.gaps.length > 0)
      ? `<span class="badge badge-gap">${f.gaps.length} gap${f.gaps.length > 1 ? 's' : ''}</span>`
      : '';

    const hoursLabel = (f.hoursMin && f.hoursMax)
      ? `<span class="hours-badge">${f.hoursMin}&ndash;${f.hoursMax}h</span>`
      : '';

    const counts = `${f.patientItems.length} patient, ${f.clinicItems.length} clinic`;

    return `
      <div class="feature-card" data-index="${i}">
        <div class="feature-header" onclick="toggleCard(this)">
          <span class="feature-arrow">&#9654;</span>
          <span class="feature-name">${esc(f.name)}</span>
          <span class="item-counts">${counts}</span>
          <div class="feature-badges">
            ${hoursLabel}
            ${gapBadge}
            <span class="badge ${viewBadgeClass}">${viewLabel}</span>
            <span class="badge ${stageBadgeClass}">${stageLabel}</span>
          </div>
        </div>
        <div class="feature-body">
          <div class="columns">
            <div class="column patient-col">
              <div class="column-header patient">Patient Portal</div>
              <ul>${patientList}</ul>
            </div>
            <div class="column clinic-col">
              <div class="column-header clinic">Clinic Console</div>
              <ul>${clinicList}</ul>
            </div>
          </div>
          ${workaround}
          ${gapHtml}
        </div>
      </div>
    `;
  }).join('');

  document.getElementById('featureList').innerHTML = html;
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function toggleCard(header) {
  header.closest('.feature-card').classList.toggle('open');
}

function toggleAllCards(open) {
  document.querySelectorAll('.feature-card').forEach(c => {
    c.classList.toggle('open', open);
  });
}

document.getElementById('stageFilter').addEventListener('click', e => {
  if (!e.target.classList.contains('pill-btn')) return;
  document.querySelectorAll('#stageFilter .pill-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  stageFilter = e.target.dataset.filter;
  render();
});

document.getElementById('viewFilter').addEventListener('click', e => {
  if (!e.target.classList.contains('pill-btn')) return;
  document.querySelectorAll('#viewFilter .pill-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  viewFilter = e.target.dataset.filter;
  render();
});

document.getElementById('showFilter').addEventListener('click', e => {
  if (!e.target.classList.contains('pill-btn')) return;
  document.querySelectorAll('#showFilter .pill-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  showFilter = e.target.dataset.filter;
  render();
});

window.addEventListener('scroll', () => {
  document.getElementById('backToTop').classList.toggle('visible', window.scrollY > 300);
});

render();
</script>

</body>
</html>
